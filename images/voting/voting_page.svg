
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#020617"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
      </defs>
      
      <!-- Background -->
      <rect width="100%" height="100%" fill="url(#bgGrad)"/>
      <rect width="100%" height="100%" fill="none" stroke="#1e293b" stroke-width="4"/>
      
      <!-- Tech Grid Pattern -->
      <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 40,0 L 40,480 M 80,0 L 80,480" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Top header bar -->
      <rect x="4" y="4" width="792" height="40" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="24" r="6" fill="#ef4444"/>
      <circle cx="40" cy="24" r="6" fill="#f59e0b"/>
      <circle cx="60" cy="24" r="6" fill="#10b981"/>
      <text x="400" y="28" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Secure College Voting System</text>
      <text x="780" y="28" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="end">secure://v1.0</text>
      
      <!-- Subtitle -->
      <text x="50" y="100" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">Ballot Cast Section</text>

      
      <!-- Ballot Cards -->
      <rect x="80" y="150" width="190" height="240" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="175" cy="200" r="30" fill="#6366f1" opacity="0.3"/>
      <text x="175" y="255" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Candidate A</text>
      <rect x="110" y="330" width="130" height="30" rx="6" fill="#6366f1"/>
      <text x="175" y="349" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Select Ballot</text>

      <rect x="300" y="150" width="190" height="240" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="395" cy="200" r="30" fill="#10b981" opacity="0.3"/>
      <text x="395" y="255" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Candidate B</text>
      <rect x="330" y="330" width="130" height="30" rx="6" fill="#10b981"/>
      <text x="395" y="349" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Select Ballot</text>

      <rect x="520" y="150" width="190" height="240" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="615" cy="200" r="30" fill="#f43f5e" opacity="0.3"/>
      <text x="615" y="255" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Candidate C</text>
      <rect x="550" y="330" width="130" height="30" rx="6" fill="#f43f5e"/>
      <text x="615" y="349" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Select Ballot</text>
    
      
      <!-- Watermark / Brand -->
      <text x="750" y="450" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="end">Maharaja M Portfolio Development</text>
    </svg>
  