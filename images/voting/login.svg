
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#020617"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
      </defs>
      
      <!-- Background -->
      <rect width="100%" height="100%" fill="url(#bgGrad)"/>
      <rect width="100%" height="100%" fill="none" stroke="#1e293b" stroke-width="4"/>
      
      <!-- Tech Grid Pattern -->
      <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 40,0 L 40,480 M 80,0 L 80,480" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Top header bar -->
      <rect x="4" y="4" width="792" height="40" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="24" r="6" fill="#ef4444"/>
      <circle cx="40" cy="24" r="6" fill="#f59e0b"/>
      <circle cx="60" cy="24" r="6" fill="#10b981"/>
      <text x="400" y="28" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Secure College Voting System</text>
      <text x="780" y="28" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="end">secure://v1.0</text>
      
      <!-- Subtitle -->
      <text x="50" y="100" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">User Authentication Portal</text>

      
      <!-- Card login -->
      <rect x="250" y="120" width="300" height="280" rx="12" fill="#1e293b" opacity="0.5" stroke="#334155" stroke-width="1"/>
      <text x="400" y="160" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Verify Identity</text>
      
      <!-- Input 1 -->
      <rect x="280" y="190" width="240" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
      <text x="295" y="215" font-family="sans-serif" font-size="14" fill="#64748b">Admission / ID Number</text>
      
      <!-- Input 2 -->
      <rect x="280" y="245" width="240" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
      <text x="295" y="270" font-family="sans-serif" font-size="14" fill="#64748b">Enter Password</text>
      
      <!-- Button -->
      <rect x="280" y="310" width="240" height="40" rx="6" fill="#6366f1"/>
      <text x="400" y="335" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Authorize &amp; Enter</text>
      
      <!-- Auth icons -->
      <circle cx="370" cy="375" r="12" fill="#0f172a"/>
      <text x="370" y="379" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">G</text>
      <circle cx="430" cy="375" r="12" fill="#0f172a"/>
      <text x="430" y="379" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Key</text>
    
      
      <!-- Watermark / Brand -->
      <text x="750" y="450" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="end">Maharaja M Portfolio Development</text>
    </svg>
  