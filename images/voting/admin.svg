
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#020617"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
      </defs>
      
      <!-- Background -->
      <rect width="100%" height="100%" fill="url(#bgGrad)"/>
      <rect width="100%" height="100%" fill="none" stroke="#1e293b" stroke-width="4"/>
      
      <!-- Tech Grid Pattern -->
      <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 40,0 L 40,480 M 80,0 L 80,480" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Top header bar -->
      <rect x="4" y="4" width="792" height="40" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="24" r="6" fill="#ef4444"/>
      <circle cx="40" cy="24" r="6" fill="#f59e0b"/>
      <circle cx="60" cy="24" r="6" fill="#10b981"/>
      <text x="400" y="28" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Secure College Voting System</text>
      <text x="780" y="28" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="end">secure://v1.0</text>
      
      <!-- Subtitle -->
      <text x="50" y="100" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">Super Admin Command Panel</text>

      
      <!-- Grid lines -->
      <path d="M 50,120 L 750,120 M 50,220 L 750,220 M 250,120 L 250,450 M 500,120 L 500,450" stroke="#1e293b" stroke-width="1"/>
      <!-- Cards -->
      <rect x="70" y="140" width="160" height="60" rx="6" fill="#1e293b" opacity="0.4"/>
      <rect x="70" y="140" width="160" height="6" rx="3" fill="#8b5cf6"/>
      <text x="90" y="175" font-family="sans-serif" font-size="14" fill="#94a3b8">Active items: 12</text>
      
      <rect x="270" y="140" width="210" height="60" rx="6" fill="#1e293b" opacity="0.4"/>
      <rect x="270" y="140" width="210" height="6" rx="3" fill="#10b981"/>
      <text x="290" y="175" font-family="sans-serif" font-size="14" fill="#94a3b8">Performance: +24%</text>

      <rect x="520" y="140" width="210" height="60" rx="6" fill="#1e293b" opacity="0.4"/>
      <rect x="520" y="140" width="210" height="6" rx="3" fill="#f43f5e"/>
      <text x="540" y="175" font-family="sans-serif" font-size="14" fill="#94a3b8">Security Status: Secure</text>

      <!-- Chart visual -->
      <path d="M 70,400 Q 150,300 250,350 T 450,250 T 650,380 T 730,220" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
      <path d="M 70,400 Q 150,300 250,350 T 450,250 T 650,380 T 730,220 L 730,420 L 70,420 Z" fill="url(#grad)" opacity="0.15"/>
      <circle cx="250" cy="350" r="6" fill="#8b5cf6"/>
      <circle cx="450" cy="250" r="6" fill="#8b5cf6"/>
      <circle cx="650" cy="380" r="6" fill="#8b5cf6"/>
      <circle cx="730" cy="220" r="6" fill="#8b5cf6"/>
    
      
      <!-- Watermark / Brand -->
      <text x="750" y="450" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="end">Maharaja M Portfolio Development</text>
    </svg>
  